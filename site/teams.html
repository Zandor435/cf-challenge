<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams — CFB Fantasy HQ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ticker">
    <div class="ticker-label">🏈 CFB Fantasy</div>
    <div class="ticker-track"><span class="ticker-item">Full Team Reference</span></div>
</div>

<nav class="nav">
    <div class="nav-brand">CFB Fantasy <span>HQ</span></div>
    <div class="league-switcher" id="league-switcher"></div>
    <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li><a href="bios.html">Bios</a></li>
        <li><a href="teams.html" class="active">Teams</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</nav>

<div class="page-wrapper" style="flex-direction: column; max-width: 900px;">

    <div class="section-header">All Drafted Teams</div>
    <div id="teams-table">
        <div class="loading"><div class="loading-spinner"></div> Loading teams...</div>
    </div>

    <div class="footer">
        <div class="footer-brand">CFB Fantasy HQ</div>
        <p>Data sourced from collegefootballdata.com</p>
    </div>
</div>

<script src="nav.js"></script>
<script>
function fmtSigned(n) {
    if (n === null || n === undefined) return '—';
    const r = Math.round(n * 10) / 10;
    return (r > 0 ? '+' : '') + r.toFixed(1);
}
function deltaColor(n) {
    if (n > 0) return 'var(--accent-green)';
    if (n < 0) return 'var(--accent-red-hover)';
    return 'var(--text-secondary)';
}

async function loadTeams() {
    const standings = await fetchJSON(getDataPath('owner_standings.json'));
    const container = document.getElementById('teams-table');
    if (!container) return;

    const owners = standings?.owners || [];
    // Flatten every pick into a row (team taken by N owners → N rows).
    const rows = [];
    owners.forEach(o => {
        (o.picks || []).forEach(p => {
            rows.push({
                team: p.team,
                conference: p.conference || '',
                side: p.side,
                line: p.line,
                owner: o.name || o.id,
                record: `${p.current_wins ?? 0}-${p.current_losses ?? 0}`,
                delta: p.current_delta,
            });
        });
    });
    rows.sort((a, b) => a.team.localeCompare(b.team) || a.owner.localeCompare(b.owner));

    if (!rows.length) {
        container.innerHTML = `
            <div class="empty-state">
                <h2>🏟️ Draft Board Empty</h2>
                <p>Picks will appear here after draft day.<br>
                Fill in the <code>picks</code> array in your league config to see them.</p>
            </div>`;
        return;
    }

    container.innerHTML = `
        <div class="card" style="overflow-x: auto; padding: 0;">
            <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                <thead>
                    <tr style="border-bottom: 2px solid var(--accent-red); text-align:left; background: var(--bg-elevated);">
                        <th style="padding:10px 16px; font-family:var(--font-display); text-transform:uppercase;">Team</th>
                        <th style="padding:10px 16px; font-family:var(--font-display); text-transform:uppercase;">Conf</th>
                        <th style="padding:10px 16px; font-family:var(--font-display); text-transform:uppercase;">Pick</th>
                        <th style="padding:10px 16px; font-family:var(--font-display); text-transform:uppercase;">Owner</th>
                        <th style="padding:10px 16px; font-family:var(--font-display); text-transform:uppercase; text-align:right;">Record</th>
                        <th style="padding:10px 16px; font-family:var(--font-display); text-transform:uppercase; text-align:right;">Current Δ</th>
                    </tr>
                </thead>
                <tbody>
                    ${rows.map(r => `
                        <tr style="border-bottom: 1px solid var(--border-subtle);">
                            <td style="padding:8px 16px; font-weight:600;">${r.team}</td>
                            <td style="padding:8px 16px; color:var(--text-muted);">${r.conference}</td>
                            <td style="padding:8px 16px;"><span class="ou-badge ${r.side}">${(r.side || '').toUpperCase()} ${r.line}</span></td>
                            <td style="padding:8px 16px; color:var(--text-secondary);">${r.owner}</td>
                            <td style="padding:8px 16px; text-align:right; font-family:var(--font-mono); color:var(--text-muted);">${r.record}</td>
                            <td style="padding:8px 16px; text-align:right; font-family:var(--font-mono); font-weight:600; color:${deltaColor(r.delta)};">${fmtSigned(r.delta)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', loadTeams);
window.addEventListener('league-changed', loadTeams);
</script>
</body>
</html>
