<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bios — CFB Fantasy HQ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ticker">
    <div class="ticker-label">🏈 CFB Fantasy</div>
    <div class="ticker-track"><span class="ticker-item">Manager Profiles</span></div>
</div>

<nav class="nav">
    <div class="nav-brand">CFB Fantasy <span>HQ</span></div>
    <div class="league-switcher" id="league-switcher"></div>
    <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li><a href="bios.html" class="active">Bios</a></li>
        <li><a href="teams.html">Teams</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</nav>

<div class="page-wrapper" style="flex-direction: column; max-width: 800px;">

    <div class="section-header">League Managers</div>
    <div id="bios-container">
        <div class="loading"><div class="loading-spinner"></div> Loading bios...</div>
    </div>

    <div class="footer">
        <div class="footer-brand">CFB Fantasy HQ</div>
        <p>These bios are AI-generated parodies. Any resemblance to actual competent fantasy managers is coincidental.</p>
    </div>
</div>

<script src="nav.js"></script>
<script>
function fmtSigned(n) {
    if (n === null || n === undefined) return '—';
    const r = Math.round(n * 10) / 10;
    return (r > 0 ? '+' : '') + r.toFixed(1);
}

async function loadBios() {
    const leagueId = getCurrentLeague();
    const standings = await fetchJSON(getDataPath('owner_standings.json'));
    const container = document.getElementById('bios-container');
    if (!container) return;

    const owners = standings?.owners || [];

    if (!owners.length) {
        container.innerHTML = `
            <div class="empty-state">
                <h2>🎙️ Coming Soon</h2>
                <p>Manager bios will be generated after the league is set up.<br>
                Each manager gets a full ESPN-style analyst profile.</p>
            </div>`;
        return;
    }

    container.innerHTML = owners.map((o, i) => `
        <div class="card ${i === 0 ? 'card-gold' : ''}" style="margin-bottom: 20px;">
            <div style="display: flex; gap: 16px; align-items: flex-start;">
                <img src="assets/portraits/${o.id || 'default'}.png"
                     onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22><rect fill=%22%23333%22 width=%2280%22 height=%2280%22/><text fill=%22%23888%22 x=%2240%22 y=%2248%22 text-anchor=%22middle%22 font-size=%2230%22>${(o.name || '?')[0]}</text></svg>'"
                     alt="${o.name || o.id}"
                     style="width: 80px; height: 80px; border-radius: var(--radius-md); object-fit: cover; flex-shrink: 0;">
                <div style="flex: 1;">
                    <div style="font-family: var(--font-display); font-size: 1.3rem; font-weight: 700;">
                        ${o.name || o.id}
                    </div>
                    <div style="font-size: 0.8rem; color: var(--accent-gold); font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;">
                        #${o.rank || '?'} · current ${fmtSigned(o.current_score)} · ${o.picks?.length || 0} picks
                    </div>
                    <div style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.7;">
                        ${o.bio_blurb || '<em style="color: var(--text-muted);">Bio coming soon — fill in bio_blurb in league config or generate via GPT.</em>'}
                    </div>
                    <div style="margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap;">
                        ${(o.picks || []).map(p => `
                            <span class="ou-badge ${p.side}" style="font-size: 0.7rem;">
                                ${(p.side || '').toUpperCase()} ${p.line} ${p.team}
                            </span>
                        `).join('')}
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

document.addEventListener('DOMContentLoaded', loadBios);
window.addEventListener('league-changed', loadBios);
</script>
</body>
</html>
