name: Weekly Data Update

on:
  workflow_dispatch: {}  # Manual trigger for testing

# This pipeline has NO `on: push` trigger, so nothing it commits can re-trigger
# it. See the recursion note on the commit step.

jobs:
  update:
    runs-on: ubuntu-latest
    # DEPLOY-FROM-INSIDE (playbook rule 9). A commit pushed with GITHUB_TOKEN does
    # NOT trigger `on: push` workflows — so a separate push-triggered Pages deploy
    # never fires on the bot's data commit and the live site drifts stale (we
    # verified this: the site froze ~16 min behind the repo). The fix rule 9
    # mandates is to deploy Pages FROM THIS job, right after it commits the fresh
    # boards. So this job needs: contents:write (commit the data), and pages:write
    # + id-token:write (publish it). No `on: push` on this pipeline, and the deploy
    # runs inline (not a separately-triggered run), so nothing here can recurse.
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Share the single Pages concurrency group with pages.yml so an inline deploy
    # and a human-push deploy can never race the one github-pages environment.
    concurrency:
      group: pages
      cancel-in-progress: false
    env:
      # The scripts read the env var CFB_API_KEY. Source it from a repo secret of
      # EITHER name so a secret saved as CFBD_API_KEY also works (|| = first non-empty).
      CFB_API_KEY: ${{ secrets.CFB_API_KEY || secrets.CFBD_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy

      # ====== SHARED: fetch results + SP+ into the one cache (needs-new-data) ======
      # continue-on-error (playbook rule 3): a fetch outage must not take the
      # pipeline dark. fetch_results.py keeps the last good (correct-season) cache
      # untouched and exits non-fatally; the reshape step below runs off it. A
      # keyless/incomplete fetch writes NOTHING (test_fetch_integrity.py).
      #
      # NO --season literal here: fetch_results.py defaults to season.json's
      # cfbd_default_season (utils.get_cfbd_default_season). This is deliberate —
      # season.json is the single source of truth ("no season literal lives in any
      # script"). If we hardcoded a year, a season flip would score the new season
      # against a cache still tagged with the old one and trip the §6 guard
      # (assert_season_matches_cache). Flip season.json only; the fetch follows.
      - name: Fetch game results + SP+
        id: fetch
        run: python scripts/fetch_results.py
        continue-on-error: true

      # ====== SURFACE the fetch outcome prominently (do not pass quietly) ======
      # continue-on-error hides the red X, so a degraded run could read as clean.
      # Make it loud: a ::warning:: annotation + a banner in the run Summary.
      - name: Report fetch outcome
        if: always()
        run: |
          if [ "${{ steps.fetch.outcome }}" = "success" ]; then
            echo "### ✅ Fetch OK — scored off a fresh CFBD pull" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=Fetch degraded::CFBD fetch did not succeed (outcome=${{ steps.fetch.outcome }}). Scored off the LAST GOOD committed cache; boards may lag live results until the next successful pull. Check the CFB_API_KEY / CFBD_API_KEY secret and CFBD availability."
            {
              echo "### ⚠️ FETCH DEGRADED — ran off the last good cache"
              echo ""
              echo "The CFBD fetch step did not succeed (\`outcome=${{ steps.fetch.outcome }}\`)."
              echo "Scoring ran off the **last committed cache** (architected fallback,"
              echo "playbook rule 3), so the boards may lag live results until the next"
              echo "successful pull."
              echo ""
              echo "**Check:** the repo secret is set — the workflow reads env \`CFB_API_KEY\`,"
              echo "sourced from a secret named \`CFB_API_KEY\` or \`CFBD_API_KEY\` — and that"
              echo "CFBD is reachable."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # ====== RESHAPE: validate -> score -> project -> timeline, all groups ======
      # Reshapes-existing-data: runs regardless of the fetch outcome, off the
      # shared cache (degrades gracefully rather than freezing). Board 1 is
      # fatal; the projector degrades. Writes docs/data/<group_id>/.
      - name: Score + project all groups
        run: python scripts/run_groups.py --group all

      # ====== COMMIT the fresh boards to the repo (history + raw files) ======
      # No [skip ci]: a commit pushed with GITHUB_TOKEN can't trigger a workflow
      # anyway (rule 9), so [skip ci] would buy nothing and only obscure intent.
      - name: Commit and push
        run: |
          git config user.name "CFB Fantasy Bot"
          git config user.email "bot@cfb-fantasy.local"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update: $(date +%Y-%m-%d) weekly data refresh"
            git push
          fi

      # ====== DEPLOY Pages FROM INSIDE this job (rule 9) ======
      # Publish the docs/ we just regenerated so the live site serves FRESH
      # numbers. This runs inline within the pipeline run — it is NOT a separately
      # push-triggered workflow, so it cannot re-trigger the pipeline (which has no
      # `on: push`). Gated on scoring having succeeded (that step is fatal, so
      # reaching here means Board 1 wrote). Shares the `pages` concurrency group
      # with pages.yml (which handles human docs/ pushes) so the two never race.
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
