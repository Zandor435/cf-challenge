name: Deploy Pages

# Publishes the static site from docs/ (GitHub Pages, source = Actions).
#
# ROLE: HUMAN pushes only. This fires when a developer pushes a docs/ change
# (shell edit, a data hand-fix, etc.). It CANNOT catch the pipeline's bot data
# commits — a commit pushed with GITHUB_TOKEN never triggers `on: push` (playbook
# rule 9) — so update-data.yml deploys its own fresh boards FROM INSIDE that job.
# Together the two cover every path to a docs/ change, and both share the `pages`
# concurrency group so they never race the one github-pages environment.
#
# Cannot recurse into the pipeline: contents:read only, commits nothing, and
# update-data.yml triggers solely on workflow_dispatch.
on:
  push:
    branches: [main]
    # Any docs/ change (shell OR boards). The cache/archive under data/ is outside
    # docs/, so it never matches here — it is not served and must not redeploy.
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

# Read-only to contents; Pages deploy needs pages + id-token. No `contents: write`
# here, so this workflow cannot commit anything — it only publishes.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let a running deploy finish (don't cancel).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
