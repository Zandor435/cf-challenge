name: Deploy Pages

# Serves the static site from docs/ on main (GitHub Pages, source = Actions).
on:
  push:
    branches: [main]
    # Deploy ONLY when the actual site changes. The data commits the pipeline
    # pushes touch docs/data/** (boards) and data/** (cache/archive) — both
    # EXCLUDED here, so a weekly data refresh never triggers a Pages rebuild.
    # (The pipeline also tags those commits [skip ci] — belt and suspenders.)
    paths:
      - 'docs/**'
      - '!docs/data/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

# Read-only to contents; Pages deploy needs pages + id-token. No `contents: write`
# here, so this workflow cannot commit anything — it only publishes.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let a running deploy finish (don't cancel).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
