name: Deploy Pages

# Serves the static site from docs/ on main (GitHub Pages, source = Actions).
on:
  push:
    branches: [main]
    # Deploy whenever anything UNDER docs/ changes — the shell (index.html/app.js/
    # style.css) AND the boards (docs/data/**). The boards MUST redeploy: with the
    # Actions-Pages model the live site serves the last uploaded artifact, so if a
    # data refresh did not redeploy, managers would see FROZEN numbers (verified:
    # excluding docs/data left the live site ~9 min stale behind the repo). That is
    # the "stale numbers" failure we must never ship, so docs/data/** is NOT
    # excluded. The cache/archive (data/**, ARCHITECTURE outside docs/) is not
    # served and never matches docs/**, so it already can't trigger a deploy.
    # This deploy cannot recurse into the pipeline: it has contents:read only,
    # commits nothing, and update-data.yml triggers solely on workflow_dispatch.
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

# Read-only to contents; Pages deploy needs pages + id-token. No `contents: write`
# here, so this workflow cannot commit anything — it only publishes.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let a running deploy finish (don't cancel).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
